<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronos · 登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 2px;
        }
        .logo p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        label {
            display: block;
            color: #94a3b8;
            font-size: 0.82rem;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #3b82f6;
        }

        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 13px;
            background: #1e40af;
            color: #e2e8f0;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 1px;
        }
        .btn:hover { background: #2563eb; }

        .error {
            margin-top: 16px;
            padding: 10px 14px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 0.88rem;
            text-align: center;
            display: none;
        }
        .error.show { display: block; }

        @media (max-width: 440px) {
            .card { margin: 16px; padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>KRONOS</h1>
            <p>金融预测平台</p>
        </div>

        <form id="loginForm" onsubmit="doLogin(event)">
            <label>访问密码</label>
            <input type="password" id="pwd" placeholder="请输入访问密码" autofocus autocomplete="current-password">
            <button class="btn" type="submit">进 入</button>
            <div class="error" id="errMsg">密码错误，请重试</div>
        </form>
    </div>

    <script>
        async function doLogin(e) {
            e.preventDefault();
            const pwd = document.getElementById('pwd').value;
            const err = document.getElementById('errMsg');
            err.classList.remove('show');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            });
            const data = await res.json();

            if (data.success) {
                const next = new URLSearchParams(location.search).get('next') || '/';
                location.href = next;
            } else {
                err.classList.add('show');
                document.getElementById('pwd').select();
            }
        }
    </script>
</body>
</html>
